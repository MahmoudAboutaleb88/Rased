        </table>
      </div>
    </div>
  </div>`;

  injectModal(`
  <div class="modal-overlay" id="x-modal">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">New Contract</div><button class="modal-close" onclick="contractCloseModal()">×</button></div>
      <div class="form-group" style="margin-bottom:16px">
        <label>SELECT CLIENT</label>
        <select id="x-clientSelect" onchange="contractShowPreview()"><option value="">— Select a client —</option></select>
      </div>
      <div class="client-preview" id="x-clientPreview">
        <img id="x-previewLogo" src="">
        <div class="client-preview-info">
          <div class="client-preview-name" id="x-previewName"></div>
          <div class="client-preview-sub"  id="x-previewSub"></div>
        </div>
      </div>
      <div class="form-grid" style="margin-top:16px">
        <div class="form-group full"><label>SERVICE TYPE</label>
          <select id="x-service_type"><option>Security</option><option>Safety</option><option>Housekeeping</option><option>Landscaping</option><option>Pest Control</option></select>
        </div>
        <div class="form-group"><label>START DATE</label><input type="date" id="x-start_date"></div>
        <div class="form-group"><label>END DATE</label><input type="date" id="x-end_date"></div>
        <div class="form-group"><label>ALLOWED DEVICES</label><input type="number" id="x-allowed_devices" placeholder="e.g. 10" min="0"></div>
        <div class="form-group"><label>ALLOWED USERS</label><input type="number" id="x-allowed_users" placeholder="e.g. 5" min="0"></div>
      </div>
      <hr class="divider">
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-outline" onclick="contractCloseModal()">Cancel</button>
        <button class="btn btn-primary" id="x-saveBtn" onclick="contractAdd()">Add Contract</button>
      </div>
    </div>
  </div>
  <div class="print-overlay" id="x-printOverlay">
    <div class="print-modal">
      <div class="print-actions">
        <button class="btn btn-outline" onclick="contractClosePrint()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Close
        </button>
        <button class="btn btn-primary" onclick="window.print()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Print
        </button>
      </div>
      <div class="contract-doc" id="x-contractDoc"></div>
    </div>
  </div>`);

  const svcColor = { Security:"blue", Safety:"green", Housekeeping:"amber", Landscaping:"green", "Pest Control":"purple" };
  let clientsData = [], allContracts = [];

  window.contractOpenModal  = () => document.getElementById("x-modal").classList.add("open");
  window.contractCloseModal = () => document.getElementById("x-modal").classList.remove("open");
  window.contractClosePrint = () => document.getElementById("x-printOverlay").classList.remove("open");

  window.contractShowPreview = () => {
    const id = document.getElementById("x-clientSelect").value;
    const c  = clientsData.find(x => x.id == id);
    const prev = document.getElementById("x-clientPreview");
    if (!c) { prev.classList.remove("visible"); return; }
    prev.classList.add("visible");
    document.getElementById("x-previewLogo").src = c.logo||"";
    document.getElementById("x-previewName").textContent = c.name_ar;
    document.getElementById("x-previewSub").textContent  = `${c.name_en||""} · ${c.contact_phone||""} · ${c.address||""}`;
  };

  window.contractFilter = () => {
    const q = document.getElementById("x-searchInput").value.toLowerCase();
    renderContractsTable(allContracts.filter(c =>
      (c.contract_no||"").toLowerCase().includes(q) ||
      (c.service_type||"").toLowerCase().includes(q) ||
      (c.client_id||"").toLowerCase().includes(q)
    ));
  };

  function renderContractsTable(rows) {
    const tb = document.getElementById("x-table");
    if (!tb) return;
    if (!rows.length) { tb.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>No contracts found</p></div></td></tr>`; return; }
    tb.innerHTML = rows.map(c => `
      <tr style="cursor:pointer" onclick="contractOpen(${c.id})">
        <td><span style="font-family:monospace;font-size:12px;background:var(--bg);padding:3px 8px;border-radius:4px">${c.contract_no||"—"}</span></td>
        <td class="td-muted">${clientsData.find(x=>x.id==c.client_id)?.name_ar || c.client_id||"—"}</td>
        <td><span class="badge badge-${svcColor[c.service_type]||"gray"}">${c.service_type||"—"}</span></td>
        <td class="td-muted">${c.start_date ? c.start_date.split("T")[0] : "—"}</td>
        <td class="td-muted">${c.end_date   ? c.end_date.split("T")[0]   : "—"}</td>
        <td>${statusBadge(c.status)}</td>
      </tr>`).join("");
  }

  window.contractOpen = (id) => {
    const c = allContracts.find(x => x.id == id);
    if (!c) return;
    const client = clientsData.find(x => x.id == c.client_id) || {};
    const statusClass = { active:"contract-status-active", expired:"contract-status-expired", pending:"contract-status-pending" }[(c.status||"").toLowerCase()] || "contract-status-pending";
    const logoHtml = client.logo
      ? `<img class="contract-client-logo" src="${client.logo}">`
      : `<div class="contract-client-logo-placeholder">${(client.name_ar||"?")[0]}</div>`;
    document.getElementById("x-contractDoc").innerHTML = `
      <div class="contract-doc-header">
        <div class="contract-logo-wrap">
          <div class="contract-logo-icon" style="background:none;padding:0;overflow:hidden"><img src="rasedlogo.png" style="width:48px;height:48px;object-fit:contain"></div>
          <div><div class="contract-brand-name">RASED</div><div class="contract-brand-sub">Facility Management System</div></div>
        </div>
        <div class="contract-doc-title"><h1>عقد خدمات</h1><p>Service Contract</p><div class="contract-no-badge">${c.contract_no||"—"}</div></div>
      </div>
      <div class="contract-section">
        <div class="contract-section-title">بيانات العميل — Client Information</div>
        <div class="contract-client-box">${logoHtml}<div><div class="contract-client-name">${client.name_ar||"—"}</div><div class="contract-client-sub">${client.name_en||""} ${client.contact_phone?"· "+client.contact_phone:""} ${client.address?"· "+client.address:""}</div></div></div>
      </div>
      <div class="contract-section">
        <div class="contract-section-title">تفاصيل العقد — Contract Details</div>
        <div class="contract-grid">
          <div class="contract-field"><label>نوع الخدمة / Service Type</label><span>${c.service_type||"—"}</span></div>
          <div class="contract-field"><label>رقم العقد / Contract No</label><span style="font-family:monospace">${c.contract_no||"—"}</span></div>
          <div class="contract-field"><label>تاريخ البدء / Start Date</label><span>${c.start_date?c.start_date.split("T")[0]:"—"}</span></div>
          <div class="contract-field"><label>تاريخ الانتهاء / End Date</label><span>${c.end_date?c.end_date.split("T")[0]:"—"}</span></div>
          <div class="contract-field"><label>عدد الأجهزة / Allowed Devices</label><span>${c.allowed_devices!=null&&c.allowed_devices!==""?c.allowed_devices+" جهاز":"—"}</span></div>
          <div class="contract-field"><label>عدد المستخدمين / Allowed Users</label><span>${c.allowed_users!=null&&c.allowed_users!==""?c.allowed_users+" مستخدم":"—"}</span></div>
        </div>
      </div>
      <div class="contract-section">
        <div class="contract-section-title">الحالة — Status</div>
        <div class="contract-status-row"><span class="contract-status-label">حالة العقد / Contract Status</span><span class="${statusClass}">${c.status||"—"}</span></div>
      </div>
      <div class="contract-section">
        <div class="contract-section-title">بنود العقد — Terms</div>
        <div style="font-size:13px;color:#475569;line-height:2;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px 20px">
          <p>١. يلتزم مزود الخدمة بتقديم خدمات ${c.service_type||"—"} وفق المواصفات المتفق عليها.</p>
          <p>٢. مدة العقد من ${c.start_date?c.start_date.split("T")[0]:"—"} إلى ${c.end_date?c.end_date.split("T")[0]:"—"}.</p>
          <p>٣. يحق لأي من الطرفين إنهاء العقد بإشعار كتابي مسبق مدته ثلاثون (30) يوماً.</p>
          <p>٤. يخضع هذا العقد لأحكام نظام العمل في جمهورية مصر العربية.</p>
        </div>
      </div>
      <div class="contract-signatures">
        <div class="signature-block"><div class="signature-line"></div><div class="signature-label">توقيع العميل / Client Signature</div><div style="font-size:12px;color:#94a3b8;margin-top:4px">${client.name_ar||""}</div></div>
        <div class="signature-block"><div class="signature-line"></div><div class="signature-label">توقيع الشركة / Company Signature</div><div style="font-size:12px;color:#94a3b8;margin-top:4px">RASED</div></div>
      </div>`;
    document.getElementById("x-printOverlay").classList.add("open");
  };

  window.contractAdd = async () => {
    const client_id  = document.getElementById("x-clientSelect").value;
    const start_date = document.getElementById("x-start_date").value;
    const end_date   = document.getElementById("x-end_date").value;
    if (!client_id)  { toast("Please select a client.", "error"); return; }
    if (!start_date) { toast("Please select a start date.", "error"); return; }
    if (!end_date)   { toast("Please select an end date.", "error"); return; }
    if (end_date < start_date) { toast("End date must be after start date.", "error"); return; }
    const btn = document.getElementById("x-saveBtn");
    btn.disabled = true; btn.textContent = "Saving…";
    try {
      const ad = document.getElementById("x-allowed_devices").value.trim();
      const au = document.getElementById("x-allowed_users").value.trim();
      await api({ action:"addContract", client_id, start_date, end_date,
        service_type:    document.getElementById("x-service_type").value,
        allowed_devices: ad !== "" ? Number(ad) : "",
        allowed_users:   au !== "" ? Number(au) : ""
      }, { noCache: true });
      invalidateCache("getContracts");
      toast("Contract added!", "success");
      contractCloseModal();
      fetchContractsData();
    } catch { toast("Error adding contract.", "error"); }
    finally { btn.disabled = false; btn.textContent = "Add Contract"; }
  };

  async function fetchContractsData() {
    try {
      const data = await api({ action:"getClients" });
      clientsData = data.data||[];
      const sel = document.getElementById("x-clientSelect");
      if (sel && sel.options.length <= 1) {
        clientsData.forEach(c => {
          const opt = document.createElement("option");
          opt.value = c.id;
          opt.textContent = `${c.name_ar} — ${c.name_en}`;
          sel.appendChild(opt);
        });
      }
    } catch {}
    try {
      const data = await api({ action:"getContracts" }, {
        onUpdate: (f) => { allContracts = f.data||[]; renderContractsTable(allContracts); }
      });
      allContracts = data.data||[];
      renderContractsTable(allContracts);
    } catch { document.getElementById("x-table").innerHTML = `<tr><td colspan="6"><div class="alert alert-error">Failed to load contracts</div></td></tr>`; }
  }
  fetchContractsData();
}


/* ════════════════════════════════════════════════════
   VIEW: CHAT
   ════════════════════════════════════════════════════ */
function loadChat(container) {
  // Chat بيحتاج layout مختلف
  container.innerHTML = `
  <div class="chat-layout">
    <div class="chat-sidebar">
      <div class="chat-sidebar-header">CONVERSATIONS</div>
      <div class="chat-sidebar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="chat-userSearch" placeholder="Search users…" oninput="chatFilterUsers()">
      </div>
      <div class="chat-sidebar-body" id="chat-usersList">
        <div class="users-loading"><div class="spinner"></div> Loading…</div>
      </div>
    </div>
    <div class="chat-pane">
      <div id="chat-header" class="chat-header" style="display:none">
        <div class="avatar" id="chat-avatar">?</div>
        <div>
          <div class="chat-header-name" id="chat-headerName">User</div>
          <div class="chat-header-sub"  id="chat-headerSub">Direct message</div>
        </div>
      </div>
      <div id="chat-empty" class="chat-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Select a conversation to start messaging</p>
      </div>
      <div class="chat-messages" id="chat-messages" style="display:none"></div>
      <div class="chat-input-area" id="chat-inputArea" style="display:none">
        <textarea id="chat-messageInput" placeholder="Type a message…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chatSend()}"
          oninput="chatAutoResize(this)"></textarea>
        <button class="send-btn" onclick="chatSend()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>`;

  let chatAllUsers = [], chatReceiver = null, chatLastIds = new Set(), chatClientsMap = {};

  async function chatInit() {
    try {
      const data = await api({ action:"getClients" });
      (data.data||[]).forEach(c => { chatClientsMap[c.id] = c.name_ar||c.name_en||""; });
    } catch {}
    try {
      const data = await api({ action:"getUsers" }, {
        onUpdate: (f) => { chatAllUsers = (f.data||[]).filter(u => u.id != currentUser.id); chatRenderUsers(chatAllUsers); }
      });
      chatAllUsers = (data.data||[]).filter(u => u.id != currentUser.id);
      chatRenderUsers(chatAllUsers);
    } catch {
      document.getElementById("chat-usersList").innerHTML = `<div style="text-align:center;color:var(--danger);font-size:13px;padding:20px">Failed to load users</div>`;
    }
  }

  function chatRenderUsers(users) {
    const el = document.getElementById("chat-usersList");
    if (!el) return;
    if (!users.length) { el.innerHTML = `<div style="text-align:center;color:var(--text3);font-size:13px;padding:32px 0">No users found</div>`; return; }
    el.innerHTML = "";
    users.forEach(u => {
      const initials = (u.name||"?").split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
      const item = document.createElement("div");
      item.className = "user-item" + (chatReceiver && chatReceiver.id==u.id ? " active" : "");
      item.innerHTML = `
        <div class="avatar" style="width:34px;height:34px;font-size:12px;flex-shrink:0">${u.image?`<img src="${u.image}">`:initials}</div>
        <div class="user-item-info">
          <div class="user-item-name">${u.name||"—"}</div>
          <div class="user-item-role">${chatClientsMap[u.client_id]||u.role||""}</div>
        </div>`;
      item.addEventListener("click", () => chatStartConv(u));
      el.appendChild(item);
    });
  }

  window.chatFilterUsers = () => {
    const q = document.getElementById("chat-userSearch").value.toLowerCase();
    chatRenderUsers(chatAllUsers.filter(u => (u.name||"").toLowerCase().includes(q)||(u.role||"").toLowerCase().includes(q)));
  };

  function chatStartConv(u) {
    chatReceiver  = { id:u.id, name:u.name, role:u.role, image:u.image, client_id:u.client_id };
    chatLastIds   = new Set();
    document.querySelectorAll(".user-item").forEach(i => i.classList.remove("active"));
    event.currentTarget.classList.add("active");
    document.getElementById("chat-empty").style.display    = "none";
    document.getElementById("chat-header").style.display   = "flex";
    document.getElementById("chat-messages").style.display = "flex";
    document.getElementById("chat-inputArea").style.display= "flex";
    const av = document.getElementById("chat-avatar");
    if (u.image) { av.innerHTML = `<img src="${u.image}">`; }
    else { av.textContent = (u.name||"?").split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase(); }
    document.getElementById("chat-headerName").textContent = u.name||"—";
    document.getElementById("chat-headerSub").textContent  = chatClientsMap[u.client_id]||u.role||"Direct message";
    document.getElementById("chat-messageInput").focus();
    if (window._activePollInterval) { clearInterval(window._activePollInterval); window._activePollInterval = null; }
    chatLoadMessages(true);
    window._activePollInterval = setInterval(() => chatLoadMessages(false), 3000);
  }

  async function chatLoadMessages(forceScroll) {
    if (!chatReceiver) return;
    try {
      invalidateCache("getChat");
      const data = await api({ action:"getChat", sender_id:currentUser.id }, {
        onUpdate: (f) => chatApplyMessages(f.data||[], false)
      });
      chatApplyMessages(data.data||[], forceScroll);
    } catch {}
  }

  function chatApplyMessages(allData, forceScroll) {
    if (!chatReceiver) return;
    const msgs = allData.filter(m =>
      (m.sender_id==currentUser.id && m.receiver_id==chatReceiver.id) ||
      (m.sender_id==chatReceiver.id && m.receiver_id==currentUser.id)
    );
    const box = document.getElementById("chat-messages");
    if (!box) return;
    const wasAtBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
    const newMsgs = msgs.filter(m => !chatLastIds.has(m.id));
    if (newMsgs.length === 0 && chatLastIds.size > 0) return;
    if (chatLastIds.size === 0) {
      box.innerHTML = msgs.length
        ? msgs.map(m => chatBubble(m)).join("")
        : `<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">No messages yet. Say hello!</div>`;
      msgs.forEach(m => chatLastIds.add(m.id));
    } else {
      const ph = box.querySelector("div[style*='No messages']");
      if (ph) ph.remove();
      newMsgs.forEach(m => {
        const div = document.createElement("div");
        div.innerHTML = chatBubble(m);
        box.appendChild(div.firstElementChild);
        chatLastIds.add(m.id);
      });
    }
    if (forceScroll || wasAtBottom) box.scrollTop = box.scrollHeight;
  }

  function chatBubble(m) {
    const isMe = m.sender_id == currentUser.id;
    return `<div class="msg-wrap ${isMe?"me":"other"}"><div class="bubble">${esc(m.message)}</div><div class="msg-time">${m.created_at||""}</div></div>`;
  }

  window.chatSend = async () => {
    const input = document.getElementById("chat-messageInput");
    const msg   = input.value.trim();
    if (!msg || !chatReceiver) return;
    input.value = ""; input.style.height = "auto";
    try {
      await api({ action:"addChat", sender_id:currentUser.id, receiver_id:chatReceiver.id, message:msg }, { noCache:true });
      invalidateCache("getChat");
      chatLoadMessages(true);
    } catch { toast("Failed to send message.", "error"); }
  };

  window.chatAutoResize = (el) => {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  };

  chatInit();
}


/* ════════════════════════════════════════════════════
   VIEW: REPORTS
   ════════════════════════════════════════════════════ */
function loadReports(container) {
  container.innerHTML = `
  <div class="page">
    <div class="page-header">
      <div><div class="page-title">Reports</div><div class="page-subtitle">System summary and statistics</div></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="stat-info"><div class="stat-value" id="r-clients">—</div><div class="stat-label">Clients</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="stat-info"><div class="stat-value" id="r-users">—</div><div class="stat-label">Users</div></div></div>
      <div class="stat-card"><div class="stat-icon rose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="stat-info"><div class="stat-value" id="r-contracts">—</div><div class="stat-label">Contracts</div></div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Contracts by Service Type</div></div>
      <div id="r-serviceBreakdown" style="padding:8px 0"></div>
    </div>
  </div>`;

  async function fetchReports() {
    const [c,u,x] = await Promise.all([
      api({ action:"getClients"   }),
      api({ action:"getUsers"     }),
      api({ action:"getContracts" }),
    ]);
    const set = (id,v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
    set("r-clients",  (c.data||[]).length);
    set("r-users",    (u.data||[]).length);
    set("r-contracts",(x.data||[]).length);
    const svcMap = {};
    (x.data||[]).forEach(c => { svcMap[c.service_type] = (svcMap[c.service_type]||0)+1; });
    const total = (x.data||[]).length||1;
    const colors = { Security:"#3b82f6", Safety:"#10b981", Housekeeping:"#f59e0b", Landscaping:"#22c55e", "Pest Control":"#a855f7" };
    const sb = document.getElementById("r-serviceBreakdown");
    if (!sb) return;
    const rows = Object.entries(svcMap).sort((a,b)=>b[1]-a[1]);
    sb.innerHTML = rows.length
      ? rows.map(([svc,count]) => {
          const pct = Math.round(count/total*100);
          return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="width:110px;font-size:13px;font-weight:500;flex-shrink:0">${svc}</div>
            <div style="flex:1;background:var(--bg);border-radius:4px;height:8px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${colors[svc]||"#94a3b8"};border-radius:4px;transition:width 0.6s ease"></div></div>
            <div style="font-size:12px;color:var(--text2);min-width:64px;text-align:right">${count} (${pct}%)</div>
          </div>`;
        }).join("")
      : `<div class="empty-state"><p>No contract data</p></div>`;
  }
  fetchReports();
}


/* ════════════════════════════════════════════════════
   VIEW: SETTINGS
   ════════════════════════════════════════════════════ */
function loadSettings(container) {
  const initials = (currentUser.name||"?").split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
  const prefs    = JSON.parse(localStorage.getItem("rased_prefs")||"{}");

  container.innerHTML = `
  <div class="page">
    <div class="page-header">
      <div><div class="page-title">Settings</div><div class="page-subtitle">Manage your account and preferences</div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Profile</div></div>
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
        <div class="avatar" style="width:64px;height:64px;font-size:22px;border-radius:14px;flex-shrink:0">
          ${currentUser.image ? `<img src="${currentUser.image}" style="width:64px;height:64px;border-radius:14px;object-fit:cover">` : initials}
        </div>
        <div>
          <div style="font-size:17px;font-weight:600">${esc(currentUser.name||"—")}</div>
          <div style="font-size:13px;color:var(--text2);margin-top:2px">${esc(currentUser.role||"—")}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">${esc(currentUser.phone||"—")}</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Preferences</div></div>
      <div class="settings-section">
        <div class="settings-row">
          <div><div class="settings-row-label">Notifications</div><div class="settings-row-desc">Receive system notifications</div></div>
          <label class="toggle-wrap"><input type="checkbox" checked onchange="settingsSavePref('notifications',this.checked)"><span class="toggle-track"></span></label>
        </div>
        <div class="settings-row">
          <div><div class="settings-row-label">Chat Sound</div><div class="settings-row-desc">Play sound on new message</div></div>
          <label class="toggle-wrap"><input type="checkbox" id="pref-sound" ${prefs.sound?"checked":""} onchange="settingsSavePref('sound',this.checked)"><span class="toggle-track"></span></label>
        </div>
        <div class="settings-row">
          <div><div class="settings-row-label">Chat Auto-refresh</div><div class="settings-row-desc">Auto-poll messages every 3 seconds</div></div>
          <label class="toggle-wrap"><input type="checkbox" ${prefs.poll===false?"":"checked"} id="pref-poll" onchange="settingsSavePref('poll',this.checked)"><span class="toggle-track"></span></label>
        </div>
      </div>
    </div>
    <div class="card" style="border-color:#fecaca">
      <div class="card-header" style="border-color:#fecaca"><div class="card-title" style="color:var(--danger)">Account</div></div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-size:14px;font-weight:500">Logout from RASED</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">You will be redirected to the login page</div>
        </div>
        <button class="btn btn-danger" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
  </div>`;

  window.settingsSavePref = (key, val) => {
    const p = JSON.parse(localStorage.getItem("rased_prefs")||"{}");
    p[key] = val;
    localStorage.setItem("rased_prefs", JSON.stringify(p));
    toast("Preference saved.", "success");
  };
}

</script>
</body>
</html>
