<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — RASED</title>
<link rel="stylesheet" href="style.css">
<style>
.main { height: 100vh; overflow: hidden; }
.chat-layout { display: flex; flex: 1; height: calc(100vh - 64px); overflow: hidden; }

.chat-sidebar {
  width: 280px;
  border-right: 1px solid var(--border);
  background: var(--white);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.chat-sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.chat-sidebar-search {
  position: relative;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-sidebar-search svg {
  position: absolute;
  left: 22px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--text3);
}
.chat-sidebar-search input {
  width: 100%;
  padding: 7px 10px 7px 32px;
  font-size: 13px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  outline: none;
}
.chat-sidebar-search input:focus {
  border-color: var(--accent);
  background: var(--white);
}

.chat-sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.users-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 32px 0;
  font-size: 13px;
  color: var(--text3);
}

.user-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
}
.user-item * { pointer-events: none; }
.user-item:hover { background: var(--bg); }
.user-item.active { background: #eff6ff; }

.user-item-info { flex: 1; min-width: 0; }
.user-item-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-item-role {
  font-size: 11px;
  color: var(--text3);
  margin-top: 1px;
}

.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.chat-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.chat-header-name { font-size: 15px; font-weight: 600; }
.chat-header-sub  { font-size: 12px; color: var(--text2); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg-wrap {
  display: flex;
  flex-direction: column;
  max-width: 68%;
}

.msg-wrap.me { align-self: flex-end; align-items: flex-end; }
.msg-wrap.other { align-self: flex-start; align-items: flex-start; }

.bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
}

.me .bubble    { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
.other .bubble { background: var(--white); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.msg-time { font-size: 11px; color: var(--text3); margin-top: 3px; padding: 0 4px; }

.chat-input-area {
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.chat-input-area textarea {
  flex: 1;
  resize: none;
  max-height: 120px;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  border: 1.5px solid var(--border);
}

.send-btn {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  flex-shrink: 0;
  transition: background 0.15s;
}
.send-btn:hover { background: var(--accent2); }
.send-btn svg { width: 18px; height: 18px; }

.chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  gap: 12px;
}
.chat-empty svg { width: 48px; height: 48px; }
.chat-empty p { font-size: 14px; }
</style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Chat</div>
    <div class="topbar-right">
      <div class="topbar-user" id="topbar-user"></div>
    </div>
  </div>

  <div class="chat-layout">
    <!-- Left: users list -->
    <div class="chat-sidebar">
      <div class="chat-sidebar-header">CONVERSATIONS</div>
      <div class="chat-sidebar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="userSearch" placeholder="Search users…" oninput="filterUsers()">
      </div>
      <div class="chat-sidebar-body" id="usersList">
        <div class="users-loading">
          <div class="spinner"></div> Loading…
        </div>
      </div>
    </div>

    <!-- Right: messages -->
    <div class="chat-main">
      <div id="chatHeader" class="chat-header" style="display:none">
        <div class="avatar" id="chatAvatar">?</div>
        <div>
          <div class="chat-header-name" id="chatHeaderName">User</div>
          <div class="chat-header-sub" id="chatHeaderSub">Direct message</div>
        </div>
      </div>

      <div id="chatEmpty" class="chat-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Select a conversation to start messaging</p>
      </div>

      <div class="chat-messages" id="chatMessages" style="display:none"></div>

      <div class="chat-input-area" id="chatInputArea" style="display:none">
        <textarea id="messageInput" placeholder="Type a message…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
document.getElementById("sidebar-mount").innerHTML = SIDEBAR_HTML;
const currentUser = requireAuth();
renderTopbarUser();
setActiveLink();

let currentReceiver = null;  // { id, name, role, image }
let allUsers        = [];
let lastMessageIds  = new Set();
let clientsMap      = {};    // id -> name_ar

/*
  BUG FIX: تراكم الـ polling intervals
  ─────────────────────────────────────
  المشكلة الأصلية: الكود كان بيستخدم متغير محلي (pollInterval)
  فلما الـ SPA بيعمل page swap، المتغير بيتمسح لكن الـ interval
  القديم بيفضل شغال في الخلفية. كل زيارة للصفحة = interval جديد.
  بعد 3 زيارات = 3 loops شغالين مع بعض.

  الحل: نحط الـ interval في window._activePollInterval
  عشان shared.js يقدر يمسحه قبل أي page navigate.
  وكمان نمسحه في startChat قبل ما نعمل واحد جديد.
*/

// ── Load users into sidebar ──────────────────────────────
async function loadUsers() {
  try {
    const data = await api({ action: "getUsers" }, {
      onUpdate: (fresh) => {
        allUsers = (fresh.data || []).filter(u => u.id != currentUser.id);
        renderUsersList(allUsers);
      }
    });
    allUsers = (data.data || []).filter(u => u.id != currentUser.id);
    renderUsersList(allUsers);
  } catch {
    document.getElementById("usersList").innerHTML =
      `<div style="text-align:center;color:var(--danger);font-size:13px;padding:20px">Failed to load users</div>`;
  }
}

function renderUsersList(users) {
  const el = document.getElementById("usersList");
  if (!el) return;
  if (!users.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--text3);font-size:13px;padding:32px 0">No users found</div>`;
    return;
  }
  el.innerHTML = "";
  users.forEach(u => {
    const initials = (u.name || "?").split(" ").map(n => n[0]).join("").slice(0, 2).toUpperCase();
    const isActive = currentReceiver && currentReceiver.id == u.id;

    const item = document.createElement("div");
    item.className = "user-item" + (isActive ? " active" : "");
    item._chatUser = u;

    item.innerHTML = `
      <div class="avatar" style="width:34px;height:34px;font-size:12px;flex-shrink:0">
        ${u.image ? `<img src="${u.image}">` : initials}
      </div>
      <div class="user-item-info">
        <div class="user-item-name">${u.name || "—"}</div>
        <div class="user-item-role">${clientsMap[u.client_id] || u.role || ""}</div>
      </div>`;

    item.addEventListener("click", () => startChat(item, u));
    el.appendChild(item);
  });
}

function filterUsers() {
  const q = document.getElementById("userSearch").value.toLowerCase();
  renderUsersList(allUsers.filter(u =>
    (u.name || "").toLowerCase().includes(q) ||
    (u.role || "").toLowerCase().includes(q)
  ));
}

// ── Start chat with a user ───────────────────────────────
function startChat(el, u) {
  const { id, name, role, image } = u;
  currentReceiver = { id, name, role, image };
  lastMessageIds  = new Set();

  document.querySelectorAll(".user-item").forEach(item => item.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("chatEmpty").style.display     = "none";
  document.getElementById("chatHeader").style.display    = "flex";
  document.getElementById("chatMessages").style.display  = "flex";
  document.getElementById("chatInputArea").style.display = "flex";

  const avatarEl = document.getElementById("chatAvatar");
  if (image) {
    avatarEl.innerHTML = `<img src="${image}">`;
  } else {
    const initials = name.split(" ").map(n => n[0]).join("").slice(0, 2).toUpperCase();
    avatarEl.textContent = initials;
  }
  document.getElementById("chatHeaderName").textContent = name;
  document.getElementById("chatHeaderSub").textContent  = clientsMap[u.client_id] || role || "Direct message";

  document.getElementById("messageInput").focus();

  // ← امسح أي interval قديم (سواء من زيارة سابقة أو conversation سابقة)
  if (window._activePollInterval) {
    clearInterval(window._activePollInterval);
    window._activePollInterval = null;
  }

  loadMessages(true);

  // ← اشتغل على window عشان shared.js يقدر يمسحه عند navigate
  window._activePollInterval = setInterval(() => loadMessages(false), 3000);
}

// ── Load messages ────────────────────────────────────────
async function loadMessages(forceScroll = false) {
  if (!currentReceiver) return;
  try {
    invalidateCache("getChat");
    const data = await api({ action: "getChat", sender_id: currentUser.id }, {
      onUpdate: (fresh) => applyMessages(fresh.data || [], false)
    });
    applyMessages(data.data || [], forceScroll);
  } catch { /* silent */ }
}

function applyMessages(allData, forceScroll) {
  if (!currentReceiver) return;
  const msgs = allData.filter(m =>
    (m.sender_id == currentUser.id      && m.receiver_id == currentReceiver.id) ||
    (m.sender_id == currentReceiver.id  && m.receiver_id == currentUser.id)
  );

  const box = document.getElementById("chatMessages");
  if (!box) return;
  const wasAtBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;

  const newMsgs = msgs.filter(m => !lastMessageIds.has(m.id));
  if (newMsgs.length === 0 && lastMessageIds.size > 0) return;

  if (lastMessageIds.size === 0) {
    box.innerHTML = msgs.length
      ? msgs.map(m => buildBubble(m)).join("")
      : `<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">No messages yet. Say hello!</div>`;
    msgs.forEach(m => lastMessageIds.add(m.id));
  } else {
    const placeholder = box.querySelector("div[style*='No messages']");
    if (placeholder) placeholder.remove();
    newMsgs.forEach(m => {
      const div = document.createElement("div");
      div.innerHTML = buildBubble(m);
      box.appendChild(div.firstElementChild);
      lastMessageIds.add(m.id);
    });
  }

  if (forceScroll || wasAtBottom) box.scrollTop = box.scrollHeight;
}

function buildBubble(m) {
  const isMe = m.sender_id == currentUser.id;
  return `
  <div class="msg-wrap ${isMe ? "me" : "other"}">
    <div class="bubble">${escHtml(m.message)}</div>
    <div class="msg-time">${m.created_at || ""}</div>
  </div>`;
}

// ── Send message ─────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("messageInput");
  const msg   = input.value.trim();
  if (!msg || !currentReceiver) return;

  input.value = "";
  input.style.height = "auto";

  try {
    await api({
      action:      "addChat",
      sender_id:   currentUser.id,
      receiver_id: currentReceiver.id,
      message:     msg
    }, { noCache: true });
    invalidateCache("getChat");
    loadMessages(true);
  } catch { toast("Failed to send message.", "error"); }
}

// ── Helpers ──────────────────────────────────────────────
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ← للـ full page unload (مش SPA) نمسح الـ interval كمان
window.addEventListener("beforeunload", () => {
  if (window._activePollInterval) {
    clearInterval(window._activePollInterval);
    window._activePollInterval = null;
  }
});

// Init
async function init() {
  try {
    const data = await api({ action: "getClients" });
    (data.data || []).forEach(c => { clientsMap[c.id] = c.name_ar || c.name_en || ""; });
  } catch { /* non-fatal */ }
  loadUsers();
}
init();
</script>
</body>
</html>
