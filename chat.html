<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — RASED</title>
<link rel="stylesheet" href="style.css">
<style>
.main { height: 100vh; overflow: hidden; }
.chat-layout { display: flex; flex: 1; height: calc(100vh - 64px); overflow: hidden; }

.chat-sidebar {
  width: 280px;
  border-right: 1px solid var(--border);
  background: var(--white);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.chat-sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.5px;
}

.chat-sidebar-body { padding: 12px; flex: 1; }

.receiver-input-wrap { padding: 12px; border-top: 1px solid var(--border); }
.receiver-input-wrap label { font-size: 11px; font-weight: 600; color: var(--text3); display: block; margin-bottom: 6px; }
.receiver-input-wrap input { font-size: 13px; }

.start-chat-btn {
  width: 100%;
  margin-top: 8px;
  padding: 9px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  transition: background 0.15s;
}
.start-chat-btn:hover { background: var(--accent2); }

.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.chat-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.chat-header-name { font-size: 15px; font-weight: 600; }
.chat-header-sub  { font-size: 12px; color: var(--text2); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg-wrap {
  display: flex;
  flex-direction: column;
  max-width: 68%;
}

.msg-wrap.me { align-self: flex-end; align-items: flex-end; }
.msg-wrap.other { align-self: flex-start; align-items: flex-start; }

.bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
}

.me .bubble    { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
.other .bubble { background: var(--white); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.msg-time { font-size: 11px; color: var(--text3); margin-top: 3px; padding: 0 4px; }

.chat-input-area {
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.chat-input-area textarea {
  flex: 1;
  resize: none;
  max-height: 120px;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  border: 1.5px solid var(--border);
}

.send-btn {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  flex-shrink: 0;
  transition: background 0.15s;
}
.send-btn:hover { background: var(--accent2); }
.send-btn svg { width: 18px; height: 18px; }

.chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  gap: 12px;
}
.chat-empty svg { width: 48px; height: 48px; }
.chat-empty p { font-size: 14px; }
</style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Chat</div>
    <div class="topbar-right">
      <div class="topbar-user" id="topbar-user"></div>
    </div>
  </div>

  <div class="chat-layout">
    <!-- Left: receiver input -->
    <div class="chat-sidebar">
      <div class="chat-sidebar-header">CONVERSATIONS</div>
      <div class="chat-sidebar-body">
        <div style="color:var(--text3);font-size:13px;text-align:center;padding:20px 0">
          Enter a User ID below to start chatting
        </div>
      </div>
      <div class="receiver-input-wrap">
        <label>RECEIVER USER ID</label>
        <input type="text" id="receiverId" placeholder="e.g. 42">
        <button class="start-chat-btn" onclick="startChat()">Open Chat</button>
      </div>
    </div>

    <!-- Right: messages -->
    <div class="chat-main">
      <div id="chatHeader" class="chat-header" style="display:none">
        <div class="avatar" id="chatAvatar">?</div>
        <div>
          <div class="chat-header-name" id="chatHeaderName">User</div>
          <div class="chat-header-sub">Direct message</div>
        </div>
      </div>

      <div id="chatEmpty" class="chat-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Select a conversation to start messaging</p>
      </div>

      <div class="chat-messages" id="chatMessages" style="display:none"></div>

      <div class="chat-input-area" id="chatInputArea" style="display:none">
        <textarea id="messageInput" placeholder="Type a message…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
document.getElementById("sidebar-mount").innerHTML = SIDEBAR_HTML;
const currentUser = requireAuth();
renderTopbarUser();
setActiveLink();

let currentReceiver = null;
let pollInterval    = null;

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function startChat() {
  const id = document.getElementById("receiverId").value.trim();
  if (!id) { toast("Enter a receiver user ID.", "error"); return; }
  currentReceiver = id;

  document.getElementById("chatEmpty").style.display       = "none";
  document.getElementById("chatHeader").style.display      = "flex";
  document.getElementById("chatMessages").style.display    = "flex";
  document.getElementById("chatInputArea").style.display   = "flex";
  document.getElementById("chatAvatar").textContent        = id;
  document.getElementById("chatHeaderName").textContent    = "User #" + id;

  loadMessages();
  clearInterval(pollInterval);
  pollInterval = setInterval(loadMessages, 3000);
}

async function loadMessages() {
  if (!currentReceiver) return;
  try {
    const data = await api({ action: "getChat", sender_id: currentUser.id });
    const msgs = (data.data || []).filter(m =>
      (m.sender_id == currentUser.id && m.receiver_id == currentReceiver) ||
      (m.sender_id == currentReceiver && m.receiver_id == currentUser.id)
    );

    const box = document.getElementById("chatMessages");
    const wasAtBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;

    box.innerHTML = msgs.length
      ? msgs.map(m => {
          const isMe = m.sender_id == currentUser.id;
          return `
          <div class="msg-wrap ${isMe ? "me" : "other"}">
            <div class="bubble">${escHtml(m.message)}</div>
            <div class="msg-time">${m.created_at || ""}</div>
          </div>`;
        }).join("")
      : `<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">No messages yet. Say hello!</div>`;

    if (wasAtBottom) box.scrollTop = box.scrollHeight;
  } catch { /* silent */ }
}

async function sendMessage() {
  const input = document.getElementById("messageInput");
  const msg   = input.value.trim();
  if (!msg || !currentReceiver) return;

  input.value = "";
  input.style.height = "auto";

  try {
    await api({
      action:      "addChat",
      sender_id:   currentUser.id,
      receiver_id: currentReceiver,
      message:     msg
    });
    loadMessages();
  } catch { toast("Failed to send message.", "error"); }
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Clean up polling on page unload
window.addEventListener("beforeunload", () => clearInterval(pollInterval));
</script>
</body>
</html>
