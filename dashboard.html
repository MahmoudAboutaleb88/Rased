<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — RASED</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sidebar-mount"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="welcome">Dashboard</div>
    <div class="topbar-right">
      <div class="topbar-user" id="topbar-user"></div>
    </div>
  </div>

  <div class="page">
    <div class="page-header">
      <div>
        <div class="page-title">Overview</div>
        <div class="page-subtitle">Summary of all facility data</div>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-icon blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="clientsCount">—</div>
          <div class="stat-label">Total Clients</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="usersCount">—</div>
          <div class="stat-label">Total Users</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="sitesCount">—</div>
          <div class="stat-label">Total Sites</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon rose">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="contractsCount">—</div>
          <div class="stat-label">Contracts</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Recent Contracts</div>
        <a href="contracts.html" class="btn btn-outline btn-sm">View All</a>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Contract No</th>
              <th>Client</th>
              <th>Service</th>
              <th>Start</th>
              <th>End</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="recentContracts">
            <tr><td colspan="6"><div class="loader-wrap"><div class="spinner"></div> Loading…</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
document.getElementById("sidebar-mount").innerHTML = SIDEBAR_HTML;
const user = requireAuth();
document.getElementById("welcome").textContent = "Welcome, " + (user.name || "User");
renderTopbarUser();
setActiveLink();

function renderDashboard(clients, users, sites, contracts) {
  const cc = document.getElementById("clientsCount");
  const uc = document.getElementById("usersCount");
  const sc = document.getElementById("sitesCount");
  const xc = document.getElementById("contractsCount");
  if (cc) cc.textContent = (clients.data || []).length;
  if (uc) uc.textContent = (users.data || []).length;
  if (sc) sc.textContent = (sites.data || []).length;
  if (xc) xc.textContent = (contracts.data || []).length;

  const recent = (contracts.data || []).slice(-5).reverse();
  const rc = document.getElementById("recentContracts");
  if (!rc) return;
  rc.innerHTML = recent.length
    ? recent.map(c => `
        <tr>
          <td><span style="font-family:monospace;font-size:12px;color:var(--text2)">${c.contract_no || "—"}</span></td>
          <td>${c.client_id || "—"}</td>
          <td><span class="badge badge-blue">${c.service_type || "—"}</span></td>
          <td class="td-muted">${c.start_date || "—"}</td>
          <td class="td-muted">${c.end_date || "—"}</td>
          <td>${statusBadge(c.status)}</td>
        </tr>`).join("")
    : `<tr><td colspan="6"><div class="empty-state"><p>No contracts found</p></div></td></tr>`;
}

/*
  BUG FIX: كان onUpdate بينادي loadDashboard() من جديد
  وده كان بيعمل لوب لا نهائي من طلبات API.

  الحل: كل onUpdate بيحدّث المتغير بتاعه بس، وبعدين
  بيستدعي renderDashboard مباشرة بالبيانات الجديدة
  من غير ما يعمل reload كامل.
*/
async function loadDashboard() {
  try {
    // نخزن البيانات في متغيرات محلية
    let _clients, _users, _sites, _contracts;

    function tryRender() {
      if (_clients && _users && _sites && _contracts) {
        renderDashboard(_clients, _users, _sites, _contracts);
      }
    }

    [_clients, _users, _sites, _contracts] = await Promise.all([
      api({ action: "getClients" }, {
        onUpdate: (fresh) => { _clients = fresh; tryRender(); }
      }),
      api({ action: "getUsers" }, {
        onUpdate: (fresh) => { _users = fresh; tryRender(); }
      }),
      api({ action: "getSites" }, {
        onUpdate: (fresh) => { _sites = fresh; tryRender(); }
      }),
      api({ action: "getContracts" }, {
        onUpdate: (fresh) => { _contracts = fresh; tryRender(); }
      })
    ]);

    renderDashboard(_clients, _users, _sites, _contracts);
  } catch (e) { console.error(e); }
}

loadDashboard();
</script>
</body>
</html>
