<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contracts — RASED</title>
<link rel="stylesheet" href="style.css">
<style>
.client-preview {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  display: none;
  gap: 14px;
  align-items: center;
  margin-top: 8px;
}
.client-preview.visible { display: flex; }
.client-preview img {
  width: 56px; height: 56px; object-fit: contain;
  border-radius: 8px; background: white;
  border: 1px solid var(--border); padding: 4px;
}
.client-preview-info { flex: 1; }
.client-preview-name { font-size: 15px; font-weight: 600; }
.client-preview-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── PRINT MODAL ─────────────────────────────── */
.print-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.print-overlay.open { opacity: 1; pointer-events: all; }

.print-modal {
  background: white;
  width: min(720px, 95vw);
  max-height: 90vh;
  border-radius: 14px;
  overflow-y: auto;
  transform: translateY(12px);
  transition: transform 0.2s;
  box-shadow: 0 32px 80px rgba(0,0,0,0.3);
}
.print-overlay.open .print-modal { transform: translateY(0); }

.print-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  border-radius: 14px 14px 0 0;
}

/* The actual printable document */
.contract-doc {
  padding: 48px 52px;
  font-family: 'IBM Plex Sans Arabic', Arial, sans-serif;
  color: #0f172a;
  direction: rtl;
}

.contract-doc-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 2px solid #0f172a;
}

.contract-logo-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}
.contract-logo-icon {
  width: 48px; height: 48px;
  background: #0f172a;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: white;
}
.contract-brand-name { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
.contract-brand-sub  { font-size: 11px; color: #64748b; margin-top: 2px; }

.contract-doc-title { text-align: left; }
.contract-doc-title h1 { font-size: 20px; font-weight: 700; margin: 0; }
.contract-doc-title p  { font-size: 12px; color: #64748b; margin: 4px 0 0; }

.contract-no-badge {
  display: inline-block;
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  padding: 4px 12px;
  font-family: monospace;
  font-size: 13px;
  font-weight: 600;
  margin-top: 6px;
}

.contract-section {
  margin-bottom: 28px;
}
.contract-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #64748b;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid #e2e8f0;
}

.contract-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.contract-field label {
  font-size: 11px;
  color: #94a3b8;
  display: block;
  margin-bottom: 3px;
  font-weight: 500;
}
.contract-field span {
  font-size: 14px;
  font-weight: 500;
  color: #0f172a;
}

.contract-client-box {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.contract-client-logo {
  width: 52px; height: 52px;
  border-radius: 8px;
  object-fit: contain;
  background: white;
  border: 1px solid #e2e8f0;
  padding: 4px;
  flex-shrink: 0;
}
.contract-client-logo-placeholder {
  width: 52px; height: 52px;
  border-radius: 8px;
  background: #e2e8f0;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #94a3b8;
  flex-shrink: 0;
}
.contract-client-name { font-size: 16px; font-weight: 700; }
.contract-client-sub  { font-size: 12px; color: #64748b; margin-top: 3px; }

.contract-status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 14px 20px;
}
.contract-status-label { font-size: 13px; font-weight: 500; }
.contract-status-active  { color: #15803d; background: #dcfce7; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.contract-status-expired { color: #b91c1c; background: #fee2e2; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.contract-status-pending { color: #a16207; background: #fef9c3; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }

.contract-signatures {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid #e2e8f0;
}
.signature-block { text-align: center; }
.signature-line  {
  width: 100%;
  border-bottom: 1.5px solid #0f172a;
  margin-bottom: 8px;
  height: 40px;
}
.signature-label { font-size: 12px; color: #64748b; }

@media print {
  .print-actions { display: none !important; }
  .print-overlay { position: static; background: none; opacity: 1; pointer-events: all; }
  .print-modal   { box-shadow: none; border-radius: 0; max-height: none; }
  .contract-doc  { padding: 24px 32px; }
  body > *:not(.print-overlay) { display: none !important; }
}

</style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Contracts Management</div>
    <div class="topbar-right">
      <div class="topbar-user" id="topbar-user"></div>
    </div>
  </div>

  <div class="page">
    <div class="page-header">
      <div>
        <div class="page-title">Contracts</div>
        <div class="page-subtitle">Manage service contracts</div>
      </div>
      <button class="btn btn-primary" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Contract
      </button>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">All Contracts</div>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search contracts…" oninput="filterTable()">
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Contract No</th>
              <th>Client</th>
              <th>Service</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="contractsTable">
            <tr><td colspan="6"><div class="loader-wrap"><div class="spinner"></div> Loading…</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Contract</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>SELECT CLIENT</label>
      <select id="clientSelect" onchange="showClientPreview()">
        <option value="">— Select a client —</option>
      </select>
    </div>

    <div class="client-preview" id="clientPreview">
      <img id="previewLogo" src="">
      <div class="client-preview-info">
        <div class="client-preview-name" id="previewName"></div>
        <div class="client-preview-sub" id="previewSub"></div>
      </div>
    </div>

    <div class="form-grid" style="margin-top:16px">
      <div class="form-group full">
        <label>SERVICE TYPE</label>
        <select id="service_type">
          <option value="Security">Security</option>
          <option value="Safety">Safety</option>
          <option value="Housekeeping">Housekeeping</option>
          <option value="Landscaping">Landscaping</option>
          <option value="Pest Control">Pest Control</option>
        </select>
      </div>
      <div class="form-group">
        <label>START DATE</label>
        <input type="date" id="start_date">
      </div>
      <div class="form-group">
        <label>END DATE</label>
        <input type="date" id="end_date">
      </div>
    </div>
    <hr class="divider">
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="addContract()">Add Contract</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
document.getElementById("sidebar-mount").innerHTML = SIDEBAR_HTML;
requireAuth();
renderTopbarUser();
setActiveLink();

let clientsData = [];
let allContracts = [];
const serviceColor = { Security: "blue", Safety: "green", Housekeeping: "amber", Landscaping: "green", "Pest Control": "purple" };

async function init() {
  const data = await api({ action: "getClients" });
  clientsData = data.data || [];
  const sel = document.getElementById("clientSelect");
  if (sel) {
    clientsData.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = `${c.name_ar} — ${c.name_en}`;
      sel.appendChild(opt);
    });
  }
  loadContracts();
}

function showClientPreview() {
  const id = document.getElementById("clientSelect").value;
  const c  = clientsData.find(x => x.id == id);
  const prev = document.getElementById("clientPreview");
  if (!c) { prev.classList.remove("visible"); return; }
  prev.classList.add("visible");
  document.getElementById("previewLogo").src  = c.logo || "";
  document.getElementById("previewName").textContent = c.name_ar;
  document.getElementById("previewSub").textContent  = `${c.name_en} · ${c.contact_phone || ""} · ${c.address || ""}`;
}

async function loadContracts() {
  try {
    const data = await api({ action: "getContracts" }, {
      onUpdate: (fresh) => {
        allContracts = fresh.data || [];
        renderTable(allContracts);
      }
    });
    allContracts = data.data || [];
    renderTable(allContracts);
  } catch {
    document.getElementById("contractsTable").innerHTML =
      `<tr><td colspan="6"><div class="alert alert-error">Failed to load contracts</div></td></tr>`;
  }
}

function renderTable(rows) {
  const tb = document.getElementById("contractsTable");
  if (!tb) return;
  if (!rows.length) {
    tb.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>No contracts found</p></div></td></tr>`;
    return;
  }
  tb.innerHTML = rows.map(c => {
    const sc = serviceColor[c.service_type] || "gray";
    return `
    <tr style="cursor:pointer" onclick="openContract(${c.id})">
      <td><span style="font-family:monospace;font-size:12px;background:var(--bg);padding:3px 8px;border-radius:4px">${c.contract_no || "—"}</span></td>
      <td class="td-muted">${clientsData.find(x=>x.id==c.client_id)?.name_ar || c.client_id || "—"}</td>
      <td><span class="badge badge-${sc}">${c.service_type || "—"}</span></td>
      <td class="td-muted">${c.start_date || "—"}</td>
      <td class="td-muted">${c.end_date || "—"}</td>
      <td>${statusBadge(c.status)}</td>
    </tr>`;
  }).join("");
}

function filterTable() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  renderTable(allContracts.filter(c =>
    (c.contract_no||"").toLowerCase().includes(q) ||
    (c.service_type||"").toLowerCase().includes(q) ||
    (c.client_id||"").toLowerCase().includes(q)
  ));
}

function openModal()  { document.getElementById("modal").classList.add("open"); }
function closeModal() { document.getElementById("modal").classList.remove("open"); }

async function addContract() {
  const client_id  = document.getElementById("clientSelect").value;
  const start_date = document.getElementById("start_date").value;
  const end_date   = document.getElementById("end_date").value;
  if (!client_id)  { toast("Please select a client.", "error"); return; }
  if (!start_date) { toast("Please select a start date.", "error"); return; }
  if (!end_date)   { toast("Please select an end date.", "error"); return; }
  if (end_date < start_date) { toast("End date must be after start date.", "error"); return; }

  const btn = document.getElementById("saveBtn");
  btn.disabled = true; btn.textContent = "Saving…";
  try {
    await api({
      action: "addContract",
      client_id, start_date, end_date,
      service_type: document.getElementById("service_type").value
    }, { noCache: true });
    invalidateCache("getContracts");
    toast("Contract added!", "success");
    closeModal();
    loadContracts();
  } catch { toast("Error adding contract.", "error"); }
  finally { btn.disabled = false; btn.textContent = "Add Contract"; }
}

init();

function closePrintModal() {
  document.getElementById("printOverlay").classList.remove("open");
}

function openContract(id) {
  const c = allContracts.find(x => x.id == id);
  if (!c) return;
  const client = clientsData.find(x => x.id == c.client_id) || {};

  const statusClass = {
    active:   "contract-status-active",
    expired:  "contract-status-expired",
    pending:  "contract-status-pending"
  }[(c.status||"").toLowerCase()] || "contract-status-pending";

  const logoHtml = client.logo
    ? `<img class="contract-client-logo" src="${client.logo}">`
    : `<div class="contract-client-logo-placeholder">${(client.name_ar||"?")[0]}</div>`;

  document.getElementById("contractDoc").innerHTML = `
    <div class="contract-doc-header">
      <div class="contract-logo-wrap">
        <div class="contract-logo-icon" style="background:none;padding:0;overflow:hidden">
  <img src="rasedlogo.png" style="width:48px;height:48px;object-fit:contain">
</div>
        <div>
          <div class="contract-brand-name">RASED</div>
          <div class="contract-brand-sub">Facility Management System</div>
        </div>
      </div>
      <div class="contract-doc-title">
        <h1>عقد خدمات</h1>
        <p>Service Contract</p>
        <div class="contract-no-badge">${c.contract_no || "—"}</div>
      </div>
    </div>

    <div class="contract-section">
      <div class="contract-section-title">بيانات العميل — Client Information</div>
      <div class="contract-client-box">
        ${logoHtml}
        <div>
          <div class="contract-client-name">${client.name_ar || "—"}</div>
          <div class="contract-client-sub">${client.name_en || ""} ${client.contact_phone ? "· " + client.contact_phone : ""} ${client.address ? "· " + client.address : ""}</div>
        </div>
      </div>
    </div>

    <div class="contract-section">
      <div class="contract-section-title">تفاصيل العقد — Contract Details</div>
      <div class="contract-grid">
        <div class="contract-field">
          <label>نوع الخدمة / Service Type</label>
          <span>${c.service_type || "—"}</span>
        </div>
        <div class="contract-field">
          <label>رقم العقد / Contract No</label>
          <span style="font-family:monospace">${c.contract_no || "—"}</span>
        </div>
        <div class="contract-field">
          <label>تاريخ البدء / Start Date</label>
          <span>${c.start_date || "—"}</span>
        </div>
        <div class="contract-field">
          <label>تاريخ الانتهاء / End Date</label>
          <span>${c.end_date || "—"}</span>
        </div>
      </div>
    </div>

    <div class="contract-section">
      <div class="contract-section-title">الحالة — Status</div>
      <div class="contract-status-row">
        <span class="contract-status-label">حالة العقد / Contract Status</span>
        <span class="${statusClass}">${c.status || "—"}</span>
      </div>
    </div>

    <div class="contract-section">
      <div class="contract-section-title">بنود العقد — Terms</div>
      <div style="font-size:13px;color:#475569;line-height:2;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px 20px">
        <p>١. يلتزم مزود الخدمة بتقديم خدمات ${c.service_type || "—"} وفق المواصفات المتفق عليها.</p>
        <p>٢. مدة العقد من ${c.start_date || "—"} إلى ${c.end_date || "—"}.</p>
        <p>٣. يحق لأي من الطرفين إنهاء العقد بإشعار كتابي مسبق مدته ثلاثون (30) يوماً.</p>
        <p>٤. يخضع هذا العقد لأحكام نظام العمل في المملكة العربية السعودية.</p>
      </div>
    </div>

    <div class="contract-signatures">
      <div class="signature-block">
        <div class="signature-line"></div>
        <div class="signature-label">توقيع العميل / Client Signature</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:4px">${client.name_ar || ""}</div>
      </div>
      <div class="signature-block">
        <div class="signature-line"></div>
        <div class="signature-label">توقيع الشركة / Company Signature</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:4px">RASED</div>
      </div>
    </div>
  `;

  document.getElementById("printOverlay").classList.add("open");
}
</script>

<!-- PRINT / CONTRACT VIEW MODAL -->
<div class="print-overlay" id="printOverlay">
  <div class="print-modal" id="printModal">
    <div class="print-actions">
      <button class="btn btn-outline" onclick="closePrintModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Close
      </button>
      <button class="btn btn-primary" onclick="window.print()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
    </div>
    <div class="contract-doc" id="contractDoc">
      <!-- filled dynamically -->
    </div>
  </div>
</div>

</body>
</html>
